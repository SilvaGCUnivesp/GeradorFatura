<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Página de Cadastros</title>
    <style>
        body {
            background-image: url('../static/img/background.png');
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 30px;
        }
        .btn {
            background-color: red;
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        .btn:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>
    <h1>Gerenciamento de Cadastros e Serviços</h1>
    <button class="btn">Cadastrar Cliente</button>
    <button class="btn">Verificar Cadastros</button>
    <button class="btn">Novo Serviço Prestado</button>
    <button class="btn">Cadastrar Serviços</button>
</body>
</html>
