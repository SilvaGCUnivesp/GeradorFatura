<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Serviços</title>
  <style>
    body {
       background-image: url('../static/img/background.png');
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #e0e0e0; /* cinza claro */
      font-family: Arial, sans-serif;
    }
    .container {
      background: #fff; /* branco */
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      width: 320px;
    }
    .container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #b30000; /* vermelho */
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      color: #b30000; /* vermelho */
      font-weight: bold;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #b30000;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #800000;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Cadastro de Serviços</h2>
    <div class="form-group">
      <label>Nome do Serviço:</label>
      <input type="text" id="nomeServico" placeholder="Digite o nome do serviço">
    </div>
    <div class="form-group">
      <label>Tipo de Serviço:</label>
      <label><input type="radio" name="tipo" value="hora" checked> Por Hora</label>
      <label><input type="radio" name="tipo" value="fechado"> Valor Fechado</label>
    </div>
    <div class="form-group">
      <label id="labelValor">Valor por Hora (R$):</label>
      <input type="number" id="valor" placeholder="Digite o valor">
    </div>
    <button type="button" onclick="cadastrarServico()">Cadastrar</button>
  </div>

  <script>
    const radios = document.querySelectorAll('input[name="tipo"]');
    const labelValor = document.getElementById('labelValor');

    radios.forEach(radio => {
      radio.addEventListener('change', () => {
        if (radio.value === 'hora') {
          labelValor.textContent = 'Valor por Hora (R$):';
        } else {
          labelValor.textContent = 'Valor do Serviço (R$):';
        }
      });
    });

    function cadastrarServico() {
      const nome = document.getElementById('nomeServico').value.trim();
      const tipo = document.querySelector('input[name="tipo"]:checked').value;
      const valor = document.getElementById('valor').value.trim();

      if (!nome || !valor) {
        alert('Preencha todos os campos!');
        return;
      }

      alert(`Serviço cadastrado:\nNome: ${nome}\nTipo: ${tipo}\nValor: R$ ${valor}`);
    }
  </script>
</body>
</html>
