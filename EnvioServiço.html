<!DOCTYPE html>
<html lang="en">
<head> <!-- Cabeçalho -->
    <meta charset="UTF-8">
    <title>Envio Manual De Serviço Para Faturas (Micro Empreendedor)</title>
    <style>
        body {
            background-image: url('static/img/background.png'); /* ajuste o caminho */
            background-size: cover;
            background-position: center;
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;   /* centraliza horizontal */
            align-items: center;       /* centraliza vertical */
        }
        .form-container {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        header {
            color: red;
            font-weight: bold;
            font-size: 32px;
            margin-bottom: 20px;
        }

        label, input, button {
            display: block;   /* força cada elemento a ocupar uma linha */
            margin: 10px auto; /* centraliza horizontalmente */
            width: 250px;     /* largura fixa */
        }

        input {
            padding: 8px;
            border: 1px solid #ffffff;
            border-radius: 4px;
        }

        button {
            padding: 10px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <header>Entrada de Dados - Serviços ME</header>

        <form>
            <label for="servico">Serviço</label>
            <input type="text" id="servico" name="servico">

            <label for="data_inicio">Data Início</label>
            <input type="date" id="data_inicio" name="data_inicio">

            <label for="data_fim">Data Fim</label>
            <input type="date" id="data_fim" name="data_fim">

            <label for="cliente">Nome Cliente</label>
            <input type="text" id="cliente" name="cliente">

            <button type="submit">Salvar Dados</button>
        </form>
    </div>
</body>

</html>
